<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentPortal Sync</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            width: 360px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f8fafc;
            color: #1e293b;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #4f46e5, #6366f1);
            padding: 16px 20px;
            color: white;
        }
        .header h1 {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        .header p {
            font-size: 11px;
            opacity: 0.8;
            margin-top: 2px;
        }
        .header .status-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin-right: 4px;
            vertical-align: middle;
        }
        .header .status-dot.connected { background: #4ade80; }
        .header .status-dot.disconnected { background: #f87171; }

        /* Login Section */
        .login-section {
            padding: 16px 20px;
        }
        .login-section label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .login-section input {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 12px;
            margin-bottom: 10px;
            outline: none;
            transition: border-color 0.2s;
        }
        .login-section input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.1);
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.15s;
            width: 100%;
        }
        .btn-primary {
            background: #4f46e5;
            color: white;
        }
        .btn-primary:hover { background: #4338ca; }
        .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; }
        .btn-secondary {
            background: #f1f5f9;
            color: #475569;
            border: 1px solid #e2e8f0;
        }
        .btn-secondary:hover { background: #e2e8f0; }
        .btn-danger {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }
        .btn-danger:hover { background: #fee2e2; }
        .btn-sync {
            background: #ecfdf5;
            color: #059669;
            border: 1px solid #a7f3d0;
            width: auto;
            padding: 5px 10px;
            font-size: 11px;
        }
        .btn-sync:hover { background: #d1fae5; }
        .btn-sync:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Carrier List */
        .carrier-section {
            padding: 0 20px 16px;
        }
        .section-title {
            font-size: 11px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            padding-top: 12px;
            border-top: 1px solid #f1f5f9;
        }
        .carrier-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 4px;
            background: white;
            border: 1px solid #f1f5f9;
            transition: all 0.15s;
        }
        .carrier-item:hover { border-color: #e2e8f0; }
        .carrier-info { flex: 1; }
        .carrier-name { font-size: 13px; font-weight: 600; color: #1e293b; }
        .carrier-status {
            font-size: 10px;
            font-weight: 600;
            margin-top: 2px;
        }
        .carrier-status.mapped { color: #059669; }
        .carrier-status.unmapped { color: #94a3b8; }
        .carrier-status.syncing { color: #d97706; }
        .carrier-status.error { color: #dc2626; }
        .carrier-status.success { color: #059669; }

        /* Sync All */
        .sync-all-bar {
            padding: 12px 20px;
            border-top: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sync-all-bar span {
            font-size: 11px;
            color: #94a3b8;
        }

        /* User bar */
        .user-bar {
            padding: 10px 20px;
            background: white;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .user-bar span { font-size: 12px; color: #64748b; }
        .user-bar strong { color: #1e293b; }

        .hidden { display: none; }

        @keyframes pulse { 
            0%, 100% { opacity: 1; } 
            50% { opacity: 0.5; } 
        }
        .animate-pulse { animation: pulse 1.5s infinite; }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #d97706;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <h1>AgentPortal Sync</h1>
        <p><span class="status-dot disconnected" id="statusDot"></span> <span id="statusText">Not connected</span></p>
    </div>

    <!-- Login View -->
    <div id="loginView" class="login-section">
        <label>API Base URL</label>
        <input type="text" id="apiUrl" placeholder="https://localhost:3443" value="https://localhost:3443">
        
        <label>Login Credentials</label>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        
        <button class="btn btn-primary" id="loginBtn">Sign In</button>
        <p id="loginError" style="color: #dc2626; font-size: 11px; margin-top: 8px;" class="hidden"></p>
    </div>

    <!-- Logged In View -->
    <div id="mainView" class="hidden">
        <div class="user-bar">
            <span>Signed in as <strong id="agentName">—</strong></span>
            <button class="btn btn-danger" id="logoutBtn" style="width: auto; padding: 4px 10px; font-size: 11px;">Sign Out</button>
        </div>

        <div class="carrier-section">
            <div class="section-title">Carrier Sync</div>
            <div id="carrierList">
                <p style="font-size: 12px; color: #94a3b8; text-align: center; padding: 16px;">Loading carriers...</p>
            </div>
        </div>

        <div class="sync-all-bar">
            <span id="mappedCount">— carriers mapped</span>
            <button class="btn btn-primary" id="syncAllBtn" style="width: auto; padding: 6px 14px;">Sync All</button>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
